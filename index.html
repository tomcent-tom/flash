<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flash 🇪🇸</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flash 🇪🇸" />
  <meta name="theme-color" content="#0f0f13" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2e2e42;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --know: #22c55e;
      --skip: #ef4444;
      --text: #f0f0f8;
      --muted: #888899;
      --radius: 16px;
      --back-face-bg: linear-gradient(135deg, #1a1a2e, #16213e);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f7;
        --surface: #ffffff;
        --border: #d1d1d6;
        --text: #1c1c1e;
        --muted: #6e6e73;
        --back-face-bg: linear-gradient(135deg, #ececff, #ddeeff);
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 32px;
      gap: 20px;
    }

    /* ── HOME SCREEN ──────────────────────────────────── */

    .home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 100%;
      max-width: 480px;
    }

    .home-screen.hidden { display: none !important; }

    .home-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-top: 16px;
    }

    .home-hero img {
      width: 72px;
      height: 72px;
      border-radius: 20px;
    }

    .home-hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .home-hero p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .home-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-weight: 600;
    }

    .chip-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 8px 18px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(108,99,255,0.12);
    }

    .chip:active { transform: scale(0.95); }

    .due-info {
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 20px;
    }

    .due-info.zero { opacity: 0.5; }

    .start-btn {
      width: 100%;
      padding: 16px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: -0.3px;
    }

    .start-btn:active { transform: scale(0.98); }

    .start-btn:disabled {
      opacity: 0.35;
      cursor: default;
      transform: none;
    }

    .reset-link {
      background: none;
      border: none;
      font-size: 0.72rem;
      color: var(--muted);
      cursor: pointer;
      opacity: 0.45;
      transition: opacity 0.15s;
      padding: 4px;
    }

    .reset-link:hover { opacity: 0.85; }

    /* ── STUDY SCREEN ─────────────────────────────────── */

    /* transparent wrapper — children participate in body flex directly */
    #study-wrapper { display: contents; }
    #study-wrapper.hidden { display: none; }

    header {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-btn {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    .progress-wrap {
      width: 100%;
      max-width: 480px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    /* Card */
    .scene {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 3/2;
      perspective: 1000px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 28px;
      border: 1.5px solid var(--border);
      user-select: none;
    }

    .face.front { background: var(--surface); }

    .face.back {
      background: var(--back-face-bg);
      transform: rotateY(180deg);
      border-color: var(--accent);
    }

    .face .category {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }

    .face .word {
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
    }

    .face.front .word { color: var(--text); }
    .face.back .word { color: var(--accent); }

    .face .hint {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .level-badge {
      position: absolute;
      bottom: 12px;
      right: 14px;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .tap-hint {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface);
      color: var(--text);
    }

    .btn:active { transform: scale(0.97); }

    .btn.know {
      border-color: var(--know);
      color: var(--know);
      background: rgba(34,197,94,0.08);
    }

    .btn.skip {
      border-color: var(--skip);
      color: var(--skip);
      background: rgba(239,68,68,0.08);
    }

    /* Nav */
    .nav {
      display: flex;
      gap: 10px;
      align-items: center;
      width: 100%;
      max-width: 480px;
      justify-content: center;
    }

    .nav button {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav button:hover { border-color: var(--accent); color: var(--accent); }
    .nav button:active { transform: scale(0.95); }

    .nav .counter {
      font-size: 0.85rem;
      color: var(--muted);
      min-width: 80px;
      text-align: center;
    }

    /* Score */
    .score {
      display: flex;
      gap: 20px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .score span { display: flex; align-items: center; gap: 4px; }
    .score .dot { width: 8px; height: 8px; border-radius: 50%; }
    .score .dot.know { background: var(--know); }
    .score .dot.skip { background: var(--skip); }

    /* Done screen */
    .done {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 24px;
      text-align: center;
    }

    .done.visible { display: flex; }
    .done .big { font-size: 3rem; }
    .done h2 { font-size: 1.4rem; }
    .done p { color: var(--muted); font-size: 0.9rem; }
    .done .restart {
      margin-top: 8px;
      padding: 12px 28px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    .main { display: contents; }
    .main.hidden > * { display: none !important; }
  </style>
</head>
<body>

  <!-- HOME SCREEN -->
  <div class="home-screen" id="home-screen">
    <div class="home-hero">
      <img src="/icon.svg" alt="Flash">
      <h1>Flash 🇪🇸</h1>
      <p>Spanish · Dutch vocabulary</p>
    </div>

    <div class="home-section">
      <div class="section-label">Theme</div>
      <div class="chip-group" id="home-cats"></div>
    </div>

    <div class="home-section">
      <div class="section-label">Cards per session</div>
      <div class="chip-group" id="home-counts"></div>
    </div>

    <div class="due-info" id="due-info"></div>

    <button class="start-btn" id="start-btn" onclick="startSession()">Start session →</button>

    <button class="reset-link" onclick="resetProgress()">Reset progress</button>
  </div>

  <!-- STUDY SCREEN -->
  <div id="study-wrapper" class="hidden">
    <header>
      <button class="back-btn" onclick="goHome()">← Home</button>
      <div class="score">
        <span><span class="dot know"></span><span id="score-know">0</span> got it</span>
        <span><span class="dot skip"></span><span id="score-skip">0</span> again</span>
      </div>
    </header>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-label">Card 1 of 50</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="main" id="main">
      <div class="scene" id="scene" onclick="flip()">
        <div class="card" id="card">
          <div class="face front">
            <span class="category" id="front-cat"></span>
            <span class="word" id="front-word"></span>
            <span class="hint">Tap to reveal</span>
            <span class="level-badge" id="level-badge"></span>
          </div>
          <div class="face back">
            <span class="category" id="back-cat"></span>
            <span class="word" id="back-word"></span>
            <span class="hint" id="back-hint"></span>
          </div>
        </div>
      </div>

      <p class="tap-hint" id="tap-hint">Tap the card to flip · then mark yourself</p>

      <div class="actions">
        <button class="btn skip" onclick="mark('skip')">✗ Again</button>
        <button class="btn know" onclick="mark('know')">✓ Got it</button>
      </div>

      <div class="nav">
        <button onclick="prev()" title="Previous">←</button>
        <span class="counter" id="counter">1 / 50</span>
        <button onclick="next()" title="Next">→</button>
        <button onclick="shuffle()" title="Shuffle">⇄</button>
      </div>
    </div>

    <div class="done" id="done">
      <div class="big" id="done-emoji">🎉</div>
      <h2 id="done-h2">Deck complete!</h2>
      <p id="done-msg"></p>
      <p id="done-next" style="font-size:0.8rem;color:var(--muted);margin-top:-4px;"></p>
      <button class="restart" onclick="restart()">Study again</button>
      <button onclick="goHome()" style="background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:999px;padding:8px 20px;font-size:0.8rem;font-weight:600;cursor:pointer;margin-top:4px;">← Back to home</button>
      <button onclick="resetProgress()" style="background:transparent;border:1.5px solid var(--skip);color:var(--skip);border-radius:999px;padding:8px 20px;font-size:0.8rem;font-weight:600;cursor:pointer;margin-top:4px;">Reset progress</button>
    </div>
  </div>

  <div style="text-align:center;padding:8px 0 4px;font-size:0.65rem;opacity:0.35;letter-spacing:0.05em;">v1.3.0</div>

  <script src="cards.js"></script>
  <script>
    const CATEGORIES = ["All", ...new Set(CARDS.map(c => c.category))];
    let deck = [];
    let index = 0;
    let scores = { know: 0, skip: 0 };
    let completed = new Set();
    let originalSize = 0;
    let activeCategory = "All";
    let sessionLimit = 10;
    let flipped = false;
    let srsData = {};

    const SRS_KEY = 'flash_srs';

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function addDays(base, n) {
      const d = new Date(base);
      d.setDate(d.getDate() + n);
      return d.toISOString().slice(0, 10);
    }

    function loadSRS() {
      try { return JSON.parse(localStorage.getItem(SRS_KEY) || '{}'); } catch { return {}; }
    }

    function saveSRS() {
      localStorage.setItem(SRS_KEY, JSON.stringify(srsData));
    }

    function updateSM2(cardIdx, quality) {
      const e = srsData[cardIdx] ? { ...srsData[cardIdx] } : { interval: 1, easiness: 2.5, repetitions: 0 };
      if (quality < 3) {
        e.repetitions = 0;
        e.interval = 1;
      } else {
        if (e.repetitions === 0) e.interval = 1;
        else if (e.repetitions === 1) e.interval = 6;
        else e.interval = Math.round(e.interval * e.easiness);
        e.repetitions += 1;
      }
      e.easiness = Math.max(1.3, e.easiness + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
      e.nextReview = addDays(today(), e.interval);
      srsData[cardIdx] = e;
      saveSRS();
    }

    function countDue(cat) {
      const todayStr = today();
      return CARDS.filter((card, idx) => {
        if (cat !== "All" && card.category !== cat) return false;
        const e = srsData[idx];
        return !e || !e.nextReview || e.nextReview <= todayStr;
      }).length;
    }

    function buildHomeScreen() {
      srsData = loadSRS();

      const catsEl = document.getElementById("home-cats");
      catsEl.innerHTML = "";
      CATEGORIES.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "chip" + (cat === activeCategory ? " active" : "");
        btn.textContent = cat;
        btn.onclick = () => {
          activeCategory = cat;
          document.querySelectorAll("#home-cats .chip").forEach(b =>
            b.classList.toggle("active", b.textContent === cat));
          updateDueInfo();
        };
        catsEl.appendChild(btn);
      });

      const countsEl = document.getElementById("home-counts");
      countsEl.innerHTML = "";
      [5, 10, 15, 20, "All"].forEach(n => {
        const btn = document.createElement("button");
        const val = n === "All" ? Infinity : n;
        btn.className = "chip" + (val === sessionLimit ? " active" : "");
        btn.textContent = n;
        btn.onclick = () => {
          sessionLimit = val;
          document.querySelectorAll("#home-counts .chip").forEach(b =>
            b.classList.toggle("active", b === btn));
          updateDueInfo();
        };
        countsEl.appendChild(btn);
      });

      updateDueInfo();
    }

    function updateDueInfo() {
      const due = countDue(activeCategory);
      const el = document.getElementById("due-info");
      const startBtn = document.getElementById("start-btn");
      if (due === 0) {
        el.textContent = "No cards due today";
        el.className = "due-info zero";
        startBtn.disabled = true;
      } else {
        const showing = sessionLimit === Infinity ? due : Math.min(due, sessionLimit);
        el.textContent = `${due} card${due !== 1 ? "s" : ""} due today · studying ${showing}`;
        el.className = "due-info";
        startBtn.disabled = false;
      }
    }

    function startSession() {
      document.getElementById("home-screen").classList.add("hidden");
      document.getElementById("study-wrapper").classList.remove("hidden");
      buildDeck();
      if (deck.length === 0) { showNoDue(); return; }
      render();
    }

    function goHome() {
      document.getElementById("study-wrapper").classList.add("hidden");
      document.getElementById("home-screen").classList.remove("hidden");
      document.getElementById("done").classList.remove("visible");
      document.getElementById("main").classList.remove("hidden");
      buildHomeScreen();
    }

    function buildDeck() {
      srsData = loadSRS();
      const todayStr = today();
      let cards = CARDS
        .map((card, idx) => ({ card, cardIdx: idx }))
        .filter(({ card }) => activeCategory === "All" || card.category === activeCategory)
        .filter(({ cardIdx }) => {
          const e = srsData[cardIdx];
          return !e || !e.nextReview || e.nextReview <= todayStr;
        })
        .sort(() => Math.random() - 0.5);

      if (sessionLimit !== Infinity) {
        cards = cards.slice(0, sessionLimit);
      }

      deck = cards.map(({ card, cardIdx }) => ({ card, cardIdx, level: 1 }));
      originalSize = deck.length;
      index = 0;
      completed = new Set();
      scores = { know: 0, skip: 0 };
    }

    function render() {
      flipped = false;
      const cardEl = document.getElementById("card");
      cardEl.style.transition = "none";
      cardEl.classList.remove("flipped");
      void cardEl.offsetWidth;
      cardEl.style.transition = "";
      document.getElementById("tap-hint").style.opacity = "1";

      const { card, level } = deck[index];
      const front = level === 1 ? card.es : card.nl;
      const back  = level === 1 ? card.nl : card.es;

      document.getElementById("front-cat").textContent = card.category;
      document.getElementById("front-word").textContent = front;
      document.getElementById("back-cat").textContent = card.category;
      document.getElementById("back-word").textContent = back;
      document.getElementById("back-hint").textContent = front;
      document.getElementById("level-badge").textContent = level === 1 ? "Level 1 · ES → EN" : "Level 2 · EN → ES";

      const pct = Math.round(completed.size / originalSize * 100);
      document.getElementById("prog-label").textContent = `${completed.size} of ${originalSize} mastered`;
      document.getElementById("prog-pct").textContent = pct + "%";
      document.getElementById("prog-fill").style.width = pct + "%";
      document.getElementById("counter").textContent = `${index + 1} / ${deck.length}`;

      document.getElementById("score-know").textContent = scores.know;
      document.getElementById("score-skip").textContent = scores.skip;
    }

    function flip() {
      flipped = !flipped;
      document.getElementById("card").classList.toggle("flipped", flipped);
      document.getElementById("tap-hint").style.opacity = flipped ? "0" : "1";
    }

    function reinsert(entry) {
      deck.splice(index, 1);
      const insertAt = index + 1 + Math.floor(Math.random() * Math.max(1, deck.length - index));
      deck.splice(insertAt, 0, entry);
    }

    function mark(result) {
      const entry = deck[index];
      scores[result]++;
      if (result === 'skip') {
        reinsert(entry);
        render();
        return;
      }
      if (entry.level === 1) {
        reinsert({ card: entry.card, cardIdx: entry.cardIdx, level: 2 });
        render();
        return;
      }
      updateSM2(entry.cardIdx, 4);
      completed.add(entry.card);
      deck.splice(index, 1);
      if (completed.size === originalSize) { showDone(); return; }
      if (index >= deck.length) index = 0;
      render();
    }

    function next() {
      index = (index + 1) % deck.length;
      render();
    }

    function prev() {
      index = (index - 1 + deck.length) % deck.length;
      render();
    }

    function shuffle() {
      deck.sort(() => Math.random() - 0.5);
      index = 0;
      render();
    }

    function nextReviewSummary() {
      const todayStr = today();
      const byDate = {};
      Object.values(srsData).forEach(e => {
        if (e.nextReview && e.nextReview > todayStr) {
          byDate[e.nextReview] = (byDate[e.nextReview] || 0) + 1;
        }
      });
      const dates = Object.keys(byDate).sort();
      if (!dates.length) return "";
      const next = dates[0];
      const daysUntil = Math.round((new Date(next) - new Date(todayStr)) / 86400000);
      const count = byDate[next];
      return daysUntil === 1
        ? `${count} card${count !== 1 ? 's' : ''} due tomorrow.`
        : `${count} card${count !== 1 ? 's' : ''} due in ${daysUntil} days.`;
    }

    function showDone() {
      document.getElementById("main").classList.add("hidden");
      document.getElementById("done").classList.add("visible");

      const total = scores.know + scores.skip;
      const pct = total > 0 ? Math.round(scores.know / total * 100) : 100;
      document.getElementById("done-emoji").textContent = pct >= 80 ? "🔥" : pct >= 50 ? "👍" : "💪";
      document.getElementById("done-h2").textContent = "Deck complete!";
      document.getElementById("done-msg").textContent =
        `${scores.know} correct of ${total} answers (${pct}%). ${pct >= 80 ? "Impressive!" : "Keep at it!"}`;
      document.getElementById("done-next").textContent = nextReviewSummary();
    }

    function showNoDue() {
      document.getElementById("main").classList.add("hidden");
      document.getElementById("done").classList.add("visible");
      document.getElementById("done-emoji").textContent = "✅";
      document.getElementById("done-h2").textContent = "All caught up!";
      document.getElementById("done-msg").textContent = "No cards are due for review today.";
      document.getElementById("done-next").textContent =
        nextReviewSummary() || "Complete your first session to start scheduling reviews!";
    }

    function restart() {
      document.getElementById("main").classList.remove("hidden");
      document.getElementById("done").classList.remove("visible");
      buildDeck();
      if (deck.length === 0) { showNoDue(); return; }
      render();
    }

    function resetProgress() {
      if (confirm("Clear all spaced repetition history? This cannot be undone.")) {
        localStorage.removeItem(SRS_KEY);
        srsData = {};
        if (!document.getElementById("home-screen").classList.contains("hidden")) {
          buildHomeScreen();
        } else {
          restart();
        }
      }
    }

    buildHomeScreen();
  </script>
</body>
</html>
